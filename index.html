<!DOCTYPE html>
<html>
<head>
  <title>Jr Lifestyle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <h1>Jr Lifestyle</h1>
  </nav>

  <section class="hero">
    <h2>New Drop</h2>
    <p>Streetwear Collection</p>
  </section>

  <section class="products">

    <div class="product">
      <img src="images/shirt.jpg">
      <h3>Black Tee</h3>
      <p>$25</p>
      <button onclick="addToCart('Black Tee', 25)">Add to Cart</button>
    </div>

    <div class="product">
      <img src="images/hoodie.jpg">
      <h3>Hoodie</h3>
      <p>$50</p>
      <button onclick="addToCart('Hoodie', 50)">Add to Cart</button>
    </div>

  </section>

  <section class="cart">
    <h2>Cart</h2>
    <ul id="cart"></ul>
  </section>

  <script src="script.js"></script>
</body>
</html>
#NAVBAR
<nav class="navbar">
  <h1>MY BRAND</h1>
  <div class="links">
    <a href="#tees">Tees</a>
    <a href="#sweaters">Sweaters</a>
    <a href="#hats">Hats</a>
  </div>
</nav>

    </div>
  </div>
</section>

<section id="sweaters">

      <p>$50</p>
    </div>
  </div>
</section>

<section id="hats">
  <h2>Hats</h2>

  </div>
</section>
